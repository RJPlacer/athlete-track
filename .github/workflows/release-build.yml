name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (optional for manual run)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-windows-installer:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build shaded JAR
        run: mvn -B -DskipTests package

      - name: Build installer
        shell: pwsh
        run: ./build-installer.ps1 -SkipBuild -CleanOutput

      - name: Generate SHA256 checksum
        shell: pwsh
        run: |
          Get-ChildItem dist -Filter *.exe | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)" | Set-Content -NoNewline "$($_.FullName).sha256"
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist/*.exe
            dist/*.sha256
          if-no-files-found: error

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag != ''
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/*') {
            $tag = $env:GITHUB_REF_NAME
          } elseif ('${{ github.event.inputs.tag }}' -ne '') {
            $tag = '${{ github.event.inputs.tag }}'
          } else {
            throw 'No tag found for release publish step.'
          }

          $files = Get-ChildItem dist -File |
            Where-Object { $_.Extension -in '.exe', '.sha256' } |
            ForEach-Object { $_.FullName }

          if (-not $files) {
            throw 'No release files found in dist.'
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            & gh release upload $tag @files --clobber
          } else {
            & gh release create $tag @files --title "Athlete Track $tag" --notes "Automated release build from GitHub Actions."
          }
